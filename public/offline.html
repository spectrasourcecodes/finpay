<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinPay - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #060914 0%, #0A0F1C 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 400px;
    }
    
    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #0066FF, #00C6FF);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #0066FF, #00C6FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    p {
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    button {
      background: linear-gradient(135deg, #0066FF, #00C6FF);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 102, 255, 0.4);
    }
    
    .features {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }
    
    .feature {
      text-align: center;
    }
    
    .feature-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .feature-text {
      font-size: 11px;
      color: #6B7280;
    }
    
    @media (max-width: 768px) {
      .offline-icon {
        width: 90px;
        height: 90px;
        font-size: 45px;
      }
      
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      📱
    </div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection.<br>Once you're back online, you can continue using FinPay.</p>
    <button onclick="location.reload()">Try Again</button>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">💾</div>
        <div class="feature-text">Offline Mode</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-text">Fast Loading</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <div class="feature-text">Secure</div>
      </div>
    </div>
  </div>
</body>
</html>
